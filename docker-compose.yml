# ==========================================
# 🐳 CONTAINERS & CLOUD INFRASTRUCTURE
# Docker Compose for local full-stack dev
# ==========================================
version: '3.8'

services:
  # Next.js Frontend and APIs
  crevo-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - crevo-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database / Caching (Infrastructure Layer)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crevo-network
    command: redis-server --appendonly yes

  # Background Workers / Job Queues
  # Used for high-throughput Social Media API integrations
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node scripts/worker.js
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - crevo-network
    depends_on:
      - redis

networks:
  crevo-network:
    driver: bridge

volumes:
  redis_data:
